name: Build Tor Static Binaries

on:
  push:
    branches: [main, master]
    paths:
      - 'docker/**'
      - '.github/workflows/build.yml'
  schedule:
    - cron: '0 0 1 */3 *'  # Every 3 months
  workflow_dispatch:
    inputs:
      tor_version:
        description: 'Tor version (empty for latest)'
        required: false
        default: ''
      rebuild_image:
        description: 'Force rebuild of build image'
        required: false
        default: 'false'
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: binmgr/tor

jobs:
  # ===========================================================================
  # Build the :build image (only when needed)
  # ===========================================================================
  build-image:
    name: Build Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image needs rebuild
        id: check
        run: |
          # Check if :build image exists and is recent
          if docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:build > /dev/null 2>&1; then
            if [ "${{ github.event.inputs.rebuild_image }}" = "true" ]; then
              echo "rebuild=true" >> $GITHUB_OUTPUT
              echo "Force rebuild requested"
            else
              echo "rebuild=false" >> $GITHUB_OUTPUT
              echo "Build image exists, skipping rebuild"
            fi
          else
            echo "rebuild=true" >> $GITHUB_OUTPUT
            echo "Build image not found, will build"
          fi

      - name: Build and push :build image
        if: steps.check.outputs.rebuild == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.build
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:build
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:build-cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:build-cache,mode=max

  # ===========================================================================
  # Get Tor version
  # ===========================================================================
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Get Tor Version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.tor_version }}" ]; then
            VERSION="${{ github.event.inputs.tor_version }}"
          else
            VERSION=$(curl -s https://dist.torproject.org/ | grep -oP 'tor-\K[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' | sort -V | tail -1)
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Tor version: ${VERSION}"

  # ===========================================================================
  # Build Tor binaries
  # ===========================================================================
  build:
    name: Build (${{ matrix.arch }})
    needs: [build-image, get-version]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/binmgr/tor:build
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Build Tor
        run: build-tor ${{ matrix.arch }} ${{ needs.get-version.outputs.version }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tor-linux-${{ matrix.arch }}
          path: /output/tor-linux-${{ matrix.arch }}
          retention-days: 1

  # ===========================================================================
  # Create release and runtime image
  # ===========================================================================
  release:
    name: Release
    needs: [get-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare release
        run: |
          mkdir -p release
          cp artifacts/tor-linux-* release/
          chmod +x release/tor-linux-*
          cd release
          sha256sum tor-linux-* > checksums.txt
          cat checksums.txt

      - name: Delete existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${{ needs.get-version.outputs.tag }}" \
            --repo "${{ github.repository }}" --yes --cleanup-tag 2>/dev/null || true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ needs.get-version.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --title "Tor ${{ needs.get-version.outputs.version }}" \
            --notes "## Tor ${{ needs.get-version.outputs.version }} Static Builds

          **Truly static** Linux binaries built with **musl libc**.
          Zero external dependencies - works on any Linux distribution.

          ### Binaries

          | Platform | Binary |
          |----------|--------|
          | Linux AMD64 | \`tor-linux-amd64\` |
          | Linux ARM64 | \`tor-linux-arm64\` |

          ### Docker

          \`\`\`bash
          docker run --rm ghcr.io/binmgr/tor:latest --version
          \`\`\`

          ### Verification

          \`\`\`bash
          sha256sum -c checksums.txt
          \`\`\`" \
            release/*

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare runtime image context
        run: |
          # Copy binaries with correct names for multi-arch build
          cp release/tor-linux-amd64 tor-linux-amd64
          cp release/tor-linux-arm64 tor-linux-arm64

      - name: Build and push runtime image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.get-version.outputs.version }}
