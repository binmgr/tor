name: Build Binaries

on:
  push:
    branches: [main, master]
    paths:
      - 'Dockerfile'
      - '.github/workflows/build-binaries.yml'
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      tor_version:
        description: 'Tor version (empty for latest)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: binmgr/tor

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Get Tor Version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.tor_version }}" ]; then
            VERSION="${{ github.event.inputs.tor_version }}"
          else
            VERSION=$(curl -s https://dist.torproject.org/ | grep -oP 'tor-\K[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' | sort -V | tail -1)
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Tor version: ${VERSION}"

  build:
    needs: get-version
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/binmgr/tor:build
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: linux,   arch: amd64, ext: "" }
          - { os: linux,   arch: arm64, ext: "" }
          - { os: windows, arch: amd64, ext: ".exe" }
          - { os: windows, arch: arm64, ext: ".exe" }
          - { os: darwin,  arch: amd64, ext: "" }
          - { os: darwin,  arch: arm64, ext: "" }
          - { os: freebsd, arch: amd64, ext: "" }
          - { os: freebsd, arch: arm64, ext: "" }
    steps:
      - name: Build Tor
        env:
          TOR_VERSION: ${{ needs.get-version.outputs.version }}
        run: |
          . /opt/tor-build/env/${{ matrix.os }}-${{ matrix.arch }}

          BUILD_DIR="$(mktemp -d /tmp/torbuild-XXXXXX)"
          cd "${BUILD_DIR}"

          wget -q "https://dist.torproject.org/tor-${TOR_VERSION}.tar.gz"
          tar xzf "tor-${TOR_VERSION}.tar.gz"
          cd "tor-${TOR_VERSION}"

          # shellcheck disable=SC2086
          ./configure ${CONFIGURE_FLAGS} --prefix="${BUILD_DIR}/output" || cat config.log
          make -j$(nproc)
          make install

          "${STRIP}" "${BUILD_DIR}/output/bin/tor${EXT}" 2>/dev/null || \
            strip "${BUILD_DIR}/output/bin/tor${EXT}" 2>/dev/null || true

          ARTIFACT="tor-${OSNAME}-${ARCHNAME}${EXT}"
          cp "${BUILD_DIR}/output/bin/tor${EXT}" "${GITHUB_WORKSPACE}/${ARTIFACT}"

          cat > "${GITHUB_WORKSPACE}/tor-${OSNAME}-${ARCHNAME}.json" << EOF
          {
            "org.opencontainers.image.title": "Tor Static Build",
            "org.opencontainers.image.version": "${TOR_VERSION}",
            "org.opencontainers.image.os": "${OSNAME}",
            "org.opencontainers.image.architecture": "${ARCHNAME}",
            "org.opencontainers.image.created": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "org.opencontainers.image.source": "https://github.com/${{ github.repository }}",
            "org.opencontainers.image.revision": "${{ github.sha }}",
            "org.opencontainers.image.vendor": "${{ github.repository_owner }}",
            "org.opencontainers.image.licenses": "BSD-3-Clause",
            "build.static": "true",
            "build.stripped": "true"
          }
          EOF

      - name: Upload Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: tor-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            tor-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}
            tor-${{ matrix.os }}-${{ matrix.arch }}.json
          retention-days: 1

  release:
    needs: [get-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Get YYMM tag
        id: yymm
        run: echo "tag=$(date -u +'%y%m')" >> $GITHUB_OUTPUT

      - name: Prepare release
        run: |
          mkdir -p release
          mv artifacts/* release/ 2>/dev/null || mv artifacts/*/* release/
          cd release
          chmod +x tor-linux-* tor-darwin-* tor-freebsd-* 2>/dev/null || true
          sha256sum tor-* > checksums.txt
          echo "[" > metadata.json
          first=true
          for f in *.json; do
            [ "$f" = "metadata.json" ] && continue
            [ "$first" = true ] && first=false || echo "," >> metadata.json
            cat "$f" >> metadata.json
          done
          echo "]" >> metadata.json

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd release
          gh release delete "${{ needs.get-version.outputs.tag }}" --repo "${{ github.repository }}" --yes --cleanup-tag 2>/dev/null || true
          gh release create "${{ needs.get-version.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --title "Tor ${{ needs.get-version.outputs.version }}" \
            --notes "Tor ${{ needs.get-version.outputs.version }} static builds for Linux, Windows, macOS, FreeBSD (amd64/arm64)" \
            *

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare runtime image context
        run: |
          cp release/tor-linux-amd64 tor-linux-amd64
          cp release/tor-linux-arm64 tor-linux-arm64

      - name: Build and push runtime image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25  # v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.get-version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.yymm.outputs.tag }}
