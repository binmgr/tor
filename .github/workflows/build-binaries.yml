name: Build Binaries

on:
  push:
    branches: [main, master]
    paths:
      - 'Dockerfile'
      - '.github/workflows/build-binaries.yml'
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      tor_version:
        description: 'Tor version (empty for latest)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: binmgr/tor
  OPENSSL_VERSION: "3.2.1"
  LIBEVENT_VERSION: "2.1.12-stable"
  ZLIB_VERSION: "1.3.2"
  ZSTD_VERSION: "1.5.5"
  XZ_VERSION: "5.4.5"

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Get Tor Version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.tor_version }}" ]; then
            VERSION="${{ github.event.inputs.tor_version }}"
          else
            VERSION=$(curl -s https://dist.torproject.org/ | grep -oP 'tor-\K[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' | sort -V | tail -1)
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Tor version: ${VERSION}"

  build:
    needs: get-version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: linux,   arch: amd64, ext: "" }
          - { os: linux,   arch: arm64, ext: "" }
          - { os: windows, arch: amd64, ext: ".exe" }
          - { os: windows, arch: arm64, ext: ".exe" }
          - { os: darwin,  arch: amd64, ext: "" }
          - { os: darwin,  arch: arm64, ext: "" }
          - { os: freebsd, arch: amd64, ext: "" }
          - { os: freebsd, arch: arm64, ext: "" }
    steps:
      - name: Setup and Build
        env:
          TOR_VERSION: ${{ needs.get-version.outputs.version }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential cmake pkg-config git curl wget autoconf automake libtool xz-utils

          BUILD_DIR="$HOME/build"
          CROSS_ROOT="$HOME/cross"
          DEPS_PREFIX="$HOME/deps"
          mkdir -p "$BUILD_DIR" "$CROSS_ROOT/bin" "$DEPS_PREFIX"
          cd "$BUILD_DIR"

          export CROSS_ROOT DEPS_PREFIX BUILD_DIR
          export PKG_CONFIG_PATH="$DEPS_PREFIX/lib/pkgconfig"
          export CFLAGS="" LDFLAGS=""
          OPENSSL_EXTRA=""
          OPENSSL_MAKE_TARGET=""
          OPENSSL_INSTALL_TARGET="install_sw"

          # Toolchain setup
          case "${{ matrix.os }}-${{ matrix.arch }}" in
            linux-amd64)
              sudo apt-get install -y llvm
              ZIG_VER=0.14.0
              wget -q "https://ziglang.org/download/${ZIG_VER}/zig-linux-x86_64-${ZIG_VER}.tar.xz"
              tar xJf "zig-linux-x86_64-${ZIG_VER}.tar.xz" -C "$CROSS_ROOT"
              export PATH="$CROSS_ROOT/zig-linux-x86_64-${ZIG_VER}:$CROSS_ROOT/bin:$PATH"
              # Bake -static and -L into the wrapper so every invocation (including
              # autoconf CC tests that do not receive LDFLAGS) resolves our static deps.
              printf '#!/bin/sh\nexec zig cc  -target x86_64-linux-musl -static -L%s/lib "$@"\n' "$DEPS_PREFIX" > "$CROSS_ROOT/bin/x86_64-linux-musl-gcc"
              printf '#!/bin/sh\nexec zig c++ -target x86_64-linux-musl -static -L%s/lib "$@"\n' "$DEPS_PREFIX" > "$CROSS_ROOT/bin/x86_64-linux-musl-g++"
              printf '#!/bin/sh\nexec zig ar "$@"\n'                                               > "$CROSS_ROOT/bin/x86_64-linux-musl-ar"
              printf '#!/bin/sh\nexec zig ranlib "$@"\n'                                           > "$CROSS_ROOT/bin/x86_64-linux-musl-ranlib"
              printf '#!/bin/sh\nexec llvm-strip "$@"\n'                                           > "$CROSS_ROOT/bin/x86_64-linux-musl-strip"
              chmod +x "$CROSS_ROOT/bin/x86_64-linux-musl-"*
              export CC=x86_64-linux-musl-gcc CXX=x86_64-linux-musl-g++
              export AR=x86_64-linux-musl-ar RANLIB=x86_64-linux-musl-ranlib STRIP=x86_64-linux-musl-strip
              export HOST=x86_64-linux-musl OPENSSL_TARGET=linux-x86_64
              ;;
            linux-arm64)
              sudo apt-get install -y llvm
              ZIG_VER=0.14.0
              wget -q "https://ziglang.org/download/${ZIG_VER}/zig-linux-x86_64-${ZIG_VER}.tar.xz"
              tar xJf "zig-linux-x86_64-${ZIG_VER}.tar.xz" -C "$CROSS_ROOT"
              export PATH="$CROSS_ROOT/zig-linux-x86_64-${ZIG_VER}:$CROSS_ROOT/bin:$PATH"
              # Bake -static and -L into the wrapper so every invocation (including
              # autoconf CC tests that do not receive LDFLAGS) resolves our static deps.
              printf '#!/bin/sh\nexec zig cc  -target aarch64-linux-musl -static -L%s/lib "$@"\n' "$DEPS_PREFIX" > "$CROSS_ROOT/bin/aarch64-linux-musl-gcc"
              printf '#!/bin/sh\nexec zig c++ -target aarch64-linux-musl -static -L%s/lib "$@"\n' "$DEPS_PREFIX" > "$CROSS_ROOT/bin/aarch64-linux-musl-g++"
              printf '#!/bin/sh\nexec zig ar "$@"\n'                                                > "$CROSS_ROOT/bin/aarch64-linux-musl-ar"
              printf '#!/bin/sh\nexec zig ranlib "$@"\n'                                            > "$CROSS_ROOT/bin/aarch64-linux-musl-ranlib"
              printf '#!/bin/sh\nexec llvm-strip "$@"\n'                                            > "$CROSS_ROOT/bin/aarch64-linux-musl-strip"
              chmod +x "$CROSS_ROOT/bin/aarch64-linux-musl-"*
              export CC=aarch64-linux-musl-gcc CXX=aarch64-linux-musl-g++
              export AR=aarch64-linux-musl-ar RANLIB=aarch64-linux-musl-ranlib STRIP=aarch64-linux-musl-strip
              export HOST=aarch64-linux-musl OPENSSL_TARGET=linux-aarch64
              ;;
            windows-amd64)
              sudo apt-get install -y mingw-w64
              export CC=x86_64-w64-mingw32-gcc CXX=x86_64-w64-mingw32-g++
              export AR=x86_64-w64-mingw32-ar RANLIB=x86_64-w64-mingw32-ranlib STRIP=x86_64-w64-mingw32-strip
              export HOST=x86_64-w64-mingw32 OPENSSL_TARGET=mingw64
              # install_dev: headers + static libs only; avoids windres (needed for CLI app/modules)
              OPENSSL_MAKE_TARGET="build_libs"
              OPENSSL_INSTALL_TARGET="install_dev"
              ;;
            windows-arm64)
              wget -q "https://github.com/mstorsjo/llvm-mingw/releases/download/20241217/llvm-mingw-20241217-ucrt-ubuntu-20.04-x86_64.tar.xz"
              tar xJf llvm-mingw-*.tar.xz -C "$CROSS_ROOT"
              export PATH="$CROSS_ROOT/llvm-mingw-20241217-ucrt-ubuntu-20.04-x86_64/bin:$PATH"
              export CC=aarch64-w64-mingw32-clang CXX=aarch64-w64-mingw32-clang++
              export AR=aarch64-w64-mingw32-ar RANLIB=aarch64-w64-mingw32-ranlib STRIP=aarch64-w64-mingw32-strip
              export HOST=aarch64-w64-mingw32 OPENSSL_TARGET=mingw64
              # mingw64 target selects x86_64 ASM; aarch64 clang cannot assemble it
              OPENSSL_EXTRA="no-asm"
              # install_dev: headers + static libs only; avoids windres (needed for CLI app/modules)
              OPENSSL_MAKE_TARGET="build_libs"
              OPENSSL_INSTALL_TARGET="install_dev"
              ;;
            darwin-amd64)
              sudo apt-get install -y clang libxml2-dev llvm-dev uuid-dev libssl-dev
              git clone --depth 1 https://github.com/tpoechtrager/osxcross.git "$CROSS_ROOT/osxcross"
              cd "$CROSS_ROOT/osxcross"
              wget -q "https://github.com/joseluisq/macosx-sdks/releases/download/14.0/MacOSX14.0.sdk.tar.xz" -O tarballs/MacOSX14.0.sdk.tar.xz
              UNATTENDED=1 ./build.sh || true
              cd "$BUILD_DIR"
              export PATH="$CROSS_ROOT/osxcross/target/bin:$PATH"
              export CC=x86_64-apple-darwin23-clang CXX=x86_64-apple-darwin23-clang++
              export AR=x86_64-apple-darwin23-ar RANLIB=x86_64-apple-darwin23-ranlib STRIP=x86_64-apple-darwin23-strip
              export HOST=x86_64-apple-darwin23 OPENSSL_TARGET=darwin64-x86_64-cc
              ;;
            darwin-arm64)
              sudo apt-get install -y clang libxml2-dev llvm-dev uuid-dev libssl-dev
              git clone --depth 1 https://github.com/tpoechtrager/osxcross.git "$CROSS_ROOT/osxcross"
              cd "$CROSS_ROOT/osxcross"
              wget -q "https://github.com/joseluisq/macosx-sdks/releases/download/14.0/MacOSX14.0.sdk.tar.xz" -O tarballs/MacOSX14.0.sdk.tar.xz
              UNATTENDED=1 ./build.sh || true
              cd "$BUILD_DIR"
              export PATH="$CROSS_ROOT/osxcross/target/bin:$PATH"
              export CC=aarch64-apple-darwin23-clang CXX=aarch64-apple-darwin23-clang++
              export AR=aarch64-apple-darwin23-ar RANLIB=aarch64-apple-darwin23-ranlib STRIP=aarch64-apple-darwin23-strip
              export HOST=aarch64-apple-darwin23 OPENSSL_TARGET=darwin64-arm64-cc
              ;;
            freebsd-amd64)
              sudo apt-get install -y clang lld llvm
              wget -q "https://download.freebsd.org/releases/amd64/amd64/14.3-RELEASE/base.txz"
              sudo mkdir -p /opt/freebsd
              sudo tar xJf base.txz -C /opt/freebsd ./lib ./usr/lib ./usr/include
              export CC=clang CXX=clang++ AR=llvm-ar RANLIB=llvm-ranlib STRIP=llvm-strip
              export HOST=x86_64-unknown-freebsd14 OPENSSL_TARGET=BSD-x86_64
              export CFLAGS="--sysroot=/opt/freebsd --target=x86_64-unknown-freebsd14"
              export LDFLAGS="--sysroot=/opt/freebsd --target=x86_64-unknown-freebsd14 -fuse-ld=lld"
              ;;
            freebsd-arm64)
              sudo apt-get install -y clang lld llvm
              wget -q "https://download.freebsd.org/releases/arm64/aarch64/14.3-RELEASE/base.txz"
              sudo mkdir -p /opt/freebsd
              sudo tar xJf base.txz -C /opt/freebsd ./lib ./usr/lib ./usr/include
              export CC=clang CXX=clang++ AR=llvm-ar RANLIB=llvm-ranlib STRIP=llvm-strip
              export HOST=aarch64-unknown-freebsd14 OPENSSL_TARGET=BSD-generic64
              export CFLAGS="--sysroot=/opt/freebsd --target=aarch64-unknown-freebsd14"
              export LDFLAGS="--sysroot=/opt/freebsd --target=aarch64-unknown-freebsd14 -fuse-ld=lld"
              ;;
          esac

          # Build zlib
          wget -q "https://zlib.net/zlib-${ZLIB_VERSION}.tar.gz"
          tar xzf "zlib-${ZLIB_VERSION}.tar.gz"
          cd "zlib-${ZLIB_VERSION}"
          if [ "${{ matrix.os }}" = "windows" ]; then
            cmake -S . -B _build \
              -DCMAKE_C_COMPILER="${CC}" \
              -DCMAKE_SYSTEM_NAME=Windows \
              -DCMAKE_INSTALL_PREFIX="$DEPS_PREFIX" \
              -DBUILD_SHARED_LIBS=OFF
            cmake --build _build -j$(nproc)
            cmake --install _build
          else
            CHOST="${HOST}" ./configure --prefix="$DEPS_PREFIX" --static
            make -j$(nproc)
            make install
          fi
          cd "$BUILD_DIR"

          # Build OpenSSL
          wget -q "https://www.openssl.org/source/openssl-${OPENSSL_VERSION}.tar.gz"
          tar xzf "openssl-${OPENSSL_VERSION}.tar.gz"
          cd "openssl-${OPENSSL_VERSION}"
          ./Configure "${OPENSSL_TARGET}" --prefix="$DEPS_PREFIX" --libdir=lib no-shared no-tests no-ui-console ${OPENSSL_EXTRA}
          make -j$(nproc) ${OPENSSL_MAKE_TARGET}
          make ${OPENSSL_INSTALL_TARGET}
          cd "$BUILD_DIR"

          # Build libevent
          wget -q "https://github.com/libevent/libevent/releases/download/release-${LIBEVENT_VERSION}/libevent-${LIBEVENT_VERSION}.tar.gz"
          tar xzf "libevent-${LIBEVENT_VERSION}.tar.gz"
          cd "libevent-${LIBEVENT_VERSION}"
          ./configure --prefix="$DEPS_PREFIX" --host="${HOST}" \
            --enable-static --disable-shared --disable-samples --disable-libevent-regress \
            CFLAGS="-I$DEPS_PREFIX/include $CFLAGS" \
            LDFLAGS="-L$DEPS_PREFIX/lib $LDFLAGS" \
            OPENSSL_CFLAGS="-I$DEPS_PREFIX/include" \
            OPENSSL_LIBS="-L$DEPS_PREFIX/lib -lssl -lcrypto"
          make -j$(nproc)
          make install
          cd "$BUILD_DIR"

          # Build zstd
          wget -q "https://github.com/facebook/zstd/releases/download/v${ZSTD_VERSION}/zstd-${ZSTD_VERSION}.tar.gz"
          tar xzf "zstd-${ZSTD_VERSION}.tar.gz"
          cd "zstd-${ZSTD_VERSION}"
          # Build static lib only (-C lib libzstd.a); lib-release also builds the shared lib
          # which fails for cross-targets (osxcross can't link .so on Linux, mingw produces
          # .dll but installer looks for .exe). install-static+install-includes skips the
          # zstd CLI binary install (fails for cross-compiled PE executables).
          make -j$(nproc) CC="${CC}" AR="${AR}" RANLIB="${RANLIB}" -C lib libzstd.a
          make -C lib install-static install-includes PREFIX="$DEPS_PREFIX"
          cd "$BUILD_DIR"

          # Build xz/liblzma
          wget -q "https://github.com/tukaani-project/xz/releases/download/v${XZ_VERSION}/xz-${XZ_VERSION}.tar.gz"
          tar xzf "xz-${XZ_VERSION}.tar.gz"
          cd "xz-${XZ_VERSION}"
          ./configure --prefix="$DEPS_PREFIX" --host="${HOST}" \
            --enable-static --disable-shared \
            --disable-xz --disable-xzdec --disable-lzmadec --disable-lzmainfo \
            --disable-scripts --disable-doc
          make -j$(nproc)
          make install
          cd "$BUILD_DIR"

          # Build Tor
          wget -q "https://dist.torproject.org/tor-${TOR_VERSION}.tar.gz"
          tar xzf "tor-${TOR_VERSION}.tar.gz"
          cd "tor-${TOR_VERSION}"

          CONFIGURE_FLAGS="--prefix=$BUILD_DIR/output --host=${HOST} --enable-static-tor \
            --with-libevent-dir=$DEPS_PREFIX --with-openssl-dir=$DEPS_PREFIX --with-zlib-dir=$DEPS_PREFIX \
            --enable-zstd --enable-lzma --disable-asciidoc --disable-manpage --disable-html-manual \
            --disable-module-relay --disable-module-dirauth --disable-systemd --disable-seccomp \
            --disable-libscrypt"

          [ "${{ matrix.os }}" = "windows" ] && CONFIGURE_FLAGS="$CONFIGURE_FLAGS --enable-static-libevent --enable-static-openssl --enable-static-zlib"
          [ "${{ matrix.os }}" = "darwin" ]  && CONFIGURE_FLAGS="$CONFIGURE_FLAGS --disable-gcc-hardening"
          # Cross-compilers (zig, plain clang, osxcross) don't respond to Tor's -V/-qversion probe
          CONFIGURE_FLAGS="$CONFIGURE_FLAGS --disable-tool-name-check"

          export CFLAGS="-I$DEPS_PREFIX/include $CFLAGS"
          export LDFLAGS="-L$DEPS_PREFIX/lib $LDFLAGS -static"
          export LIBS="-lzstd -llzma -lssl -lcrypto -levent -lz"
          [ "${{ matrix.os }}" = "windows" ] && LIBS="$LIBS -lws2_32 -lcrypt32 -lgdi32 -liphlpapi"

          ./configure $CONFIGURE_FLAGS || cat config.log
          make -j$(nproc)
          make install
          cd "$BUILD_DIR"

          # Strip and rename
          "${STRIP}" "output/bin/tor${{ matrix.ext }}" 2>/dev/null || strip "output/bin/tor${{ matrix.ext }}" 2>/dev/null || true
          mv "output/bin/tor${{ matrix.ext }}" "tor-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"

          # Metadata
          cat > tor-${{ matrix.os }}-${{ matrix.arch }}.json << EOF
          {
            "org.opencontainers.image.title": "Tor Static Build",
            "org.opencontainers.image.version": "${TOR_VERSION}",
            "org.opencontainers.image.os": "${{ matrix.os }}",
            "org.opencontainers.image.architecture": "${{ matrix.arch }}",
            "org.opencontainers.image.created": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "org.opencontainers.image.source": "https://github.com/${{ github.repository }}",
            "org.opencontainers.image.revision": "${{ github.sha }}",
            "org.opencontainers.image.vendor": "${{ github.repository_owner }}",
            "org.opencontainers.image.licenses": "BSD-3-Clause",
            "build.static": "true", "build.stripped": "true",
            "dependencies.openssl": "${OPENSSL_VERSION}",
            "dependencies.libevent": "${LIBEVENT_VERSION}",
            "dependencies.zlib": "${ZLIB_VERSION}",
            "dependencies.zstd": "${ZSTD_VERSION}",
            "dependencies.xz": "${XZ_VERSION}"
          }
          EOF

      - name: Upload Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: tor-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            tor-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}
            tor-${{ matrix.os }}-${{ matrix.arch }}.json
          retention-days: 1

  release:
    needs: [get-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Get YYMM tag
        id: yymm
        run: echo "tag=$(date -u +'%y%m')" >> $GITHUB_OUTPUT

      - name: Prepare release
        run: |
          mkdir -p release
          mv artifacts/* release/ 2>/dev/null || mv artifacts/*/* release/
          cd release
          chmod +x tor-linux-* tor-darwin-* tor-freebsd-* 2>/dev/null || true
          sha256sum tor-* > checksums.txt
          echo "[" > metadata.json
          first=true
          for f in *.json; do
            [ "$f" = "metadata.json" ] && continue
            [ "$first" = true ] && first=false || echo "," >> metadata.json
            cat "$f" >> metadata.json
          done
          echo "]" >> metadata.json

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd release
          gh release delete "${{ needs.get-version.outputs.tag }}" --repo "${{ github.repository }}" --yes --cleanup-tag 2>/dev/null || true
          gh release create "${{ needs.get-version.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --title "Tor ${{ needs.get-version.outputs.version }}" \
            --notes "Tor ${{ needs.get-version.outputs.version }} static builds for Linux, Windows, macOS, FreeBSD (amd64/arm64)" \
            *

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare runtime image context
        run: |
          cp release/tor-linux-amd64 tor-linux-amd64
          cp release/tor-linux-arm64 tor-linux-arm64

      - name: Build and push runtime image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25  # v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.get-version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.yymm.outputs.tag }}
