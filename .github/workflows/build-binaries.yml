name: Build Linux Binaries

on:
  push:
    branches: [main, master]
    paths:
      - 'Dockerfile'
      - '.github/workflows/build-binaries.yml'
  schedule:
    - cron: '0 0 1 * *'
  workflow_run:
    workflows: ['Build Environment Image']
    types: [completed]
  workflow_dispatch:
    inputs:
      tor_version:
        description: 'Tor version (empty for latest)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: binmgr/tor

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Get Tor Version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.tor_version }}" ]; then
            VERSION="${{ github.event.inputs.tor_version }}"
          else
            VERSION=$(curl -s https://dist.torproject.org/ | grep -oP 'tor-\K[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' | sort -V | tail -1)
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT

  build:
    name: Build (${{ matrix.arch }})
    needs: get-version
    if: >-
      ${{
        github.event_name != 'workflow_run' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          (
            github.event.workflow_run.head_branch == 'main' ||
            github.event.workflow_run.head_branch == 'master'
          )
        )
      }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/binmgr/tor:build
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Build Tor
        run: build-tor ${{ matrix.arch }} ${{ needs.get-version.outputs.version }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tor-linux-${{ matrix.arch }}
          path: /output/tor-linux-${{ matrix.arch }}

  release:
    needs: [get-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Get YYMM tag
        id: yymm
        run: echo "tag=$(date -u +'%y%m')" >> $GITHUB_OUTPUT

      - name: Prepare release
        run: |
          mkdir -p release
          cp artifacts/tor-linux-* release/
          chmod +x release/tor-linux-*
          cd release
          sha256sum tor-linux-* > SHA256SUMS.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${{ needs.get-version.outputs.tag }}" --repo "${{ github.repository }}" --yes --cleanup-tag 2>/dev/null || true
          gh release create "${{ needs.get-version.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --title "Tor ${{ needs.get-version.outputs.version }}" \
            --notes "Static Tor binaries" \
            release/*

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare runtime image context
        run: |
          cp release/tor-linux-amd64 tor-linux-amd64
          cp release/tor-linux-arm64 tor-linux-arm64

      - name: Build and push runtime image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.get-version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.yymm.outputs.tag }}
