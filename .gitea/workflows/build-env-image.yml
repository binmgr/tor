name: Build Environment Image

on:
  push:
    branches: [main, master]
    paths:
      - 'docker/Dockerfile.build'
      - '.gitea/workflows/build-env-image.yml'
  schedule:
    - cron: '0 0 1 */3 *'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: binmgr/tor

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Login to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ gitea.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25  # v5
        with:
          context: .
          file: docker/Dockerfile.build
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:build
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:build-cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:build-cache,mode=max
